id: e8-weak-tls

info:
  name: Essential Eight - Weak TLS Configuration
  author: e8mate
  severity: medium
  description: |
    Detects TLS configurations using deprecated protocols (TLS 1.0, TLS 1.1)
    or weak cipher suites. Per Essential Eight user application hardening,
    services should use current, secure protocols.
  tags: essential-eight,e8,user-application-hardening,tls,ssl,australia,compliance
  reference:
    - https://www.cyber.gov.au/acsc/view-all-content/publications/essential-eight-maturity-model
  metadata:
    e8-control: user_application_hardening
    e8-maturity-level: 1

ssl:
  - address: "{{Host}}:{{Port}}"

    matchers-condition: or
    matchers:
      - type: dsl
        name: tls10-supported
        dsl:
          - "contains(tls_version, 'tls10')"

      - type: dsl
        name: tls11-supported
        dsl:
          - "contains(tls_version, 'tls11')"

    extractors:
      - type: dsl
        dsl:
          - "tls_version"
          - "cipher"
